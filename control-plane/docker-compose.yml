services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deploydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/deploydb
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/deploydb
    depends_on:
      - db

volumes:
  pgdata:
